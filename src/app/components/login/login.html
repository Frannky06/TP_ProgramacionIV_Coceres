<app-navbar></app-navbar>

<main class="home-main">
  <div class="container" style="max-width: 500px;">
    <div class="auth-card">
      <h1 class="auth-title">Iniciar Sesión</h1>
      
      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="correo">Correo Electrónico</label>
          <input id="correo" type="email" formControlName="correo" class="form-control" placeholder="ejemplo@correo.com">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" formControlName="password" class="form-control" placeholder="Tu contraseña">
        </div>

        <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || loading">
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div class="quick-login-divider">
        <span>o Inicio Rápido</span>
      </div>

      <div class="quick-login-buttons">
        <button type="button" class="quick-btn admin-btn" (click)="quickLogin('admin')" [disabled]="loading">Admin</button>
        <button type="button" class="quick-btn user-btn" (click)="quickLogin('user')" [disabled]="loading">Usuario</button>
        <button type="button" class="quick-btn tester-btn" (click)="quickLogin('tester')" [disabled]="loading">Tester</button>
      </div>
    </div>
  </div>
</main>
