<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/home" class="navbar-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-text">Gameroom</span>
    </a>

    <div class="navbar-links">
      <a routerLink="/home" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
      </a>
      <a routerLink="/quien-soy" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">👤</span>
        <span>Quién Soy</span>
      </a>
      
      @if (authService.isLoggedIn()) {
        <a routerLink="/resultados" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">📊</span>
          <span>Resultados</span>
        </a>
        <a (click)="logout()" class="nav-link" style="cursor: pointer;">
          <span class="nav-icon">🚪</span>
          <span>Salir</span>
        </a>
      } @else {
        <a routerLink="/registro" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">📝</span>
          <span>Registro</span>
        </a>
        <a routerLink="/login" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">🔑</span>
          <span>Login</span>
        </a>
      }
    </div>
  </div>
</nav>
