<app-navbar></app-navbar>

<main class="home-main">
  <div class="container" style="max-width: 500px;">
    <div class="auth-card">
      <h1 class="auth-title">Crear Cuenta</h1>
      
      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" formControlName="nombre" class="form-control" placeholder="Tu nombre">
        </div>
        
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input id="apellido" type="text" formControlName="apellido" class="form-control" placeholder="Tu apellido">
        </div>

        <div class="form-group">
          <label for="edad">Edad</label>
          <input id="edad" type="number" formControlName="edad" class="form-control" placeholder="Tu edad">
        </div>

        <div class="form-group">
          <label for="correo">Correo Electrónico</label>
          <input id="correo" type="email" formControlName="correo" class="form-control" placeholder="ejemplo@correo.com">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" formControlName="password" class="form-control" placeholder="Mínimo 6 caracteres">
        </div>

        <button type="submit" class="submit-btn" [disabled]="registroForm.invalid || loading">
          {{ loading ? 'Registrando...' : 'Registrarse' }}
        </button>
      </form>
    </div>
  </div>
</main>
